services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kh_app
    restart: always
    env_file:
      - .env
    environment:
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: kh_downloader
      DB_USERNAME: kh_user
      DB_PASSWORD: kh_password_secure
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
      - public_assets:/var/www/public
    depends_on:
      - db
      - redis
    networks:
      - kh_network

  web:
    image: nginx:stable-alpine
    container_name: kh_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - public_assets:/var/www/public:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - kh_network

  redis:
    image: redis:alpine
    container_name: kh_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - kh_network

  db:
    image: mysql:8.0
    container_name: kh_db
    restart: always
    environment:
      MYSQL_DATABASE: kh_downloader
      MYSQL_USER: kh_user
      MYSQL_PASSWORD: kh_password_secure
      MYSQL_ROOT_PASSWORD: root_password_very_secure
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - kh_network

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: kh_flaresolverr
    restart: always
    environment:
      - LOG_LEVEL=info
    networks:
      - kh_network
    # Port 8191 is NOT exposed to the public internet (no ports: mapping).
    # Only the Laravel app container can reach it via the internal Docker network.

networks:
  kh_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  public_assets:
