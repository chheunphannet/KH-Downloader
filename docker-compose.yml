services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kh_app
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8000
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: kh_downloader
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      YT_DLP_BINARY: yt-dlp
      DOWNLOAD_TEMP_PATH: /var/www/storage/app/yt-dlp-temp
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - public_build:/var/www/public/build
    depends_on:
      - db
      - redis
    networks:
      - kh_network

  web:
    image: nginx:stable-alpine
    container_name: kh_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:ro
      - public_build:/var/www/public/build:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - kh_network

  redis:
    image: redis:alpine
    container_name: kh_redis
    networks:
      - kh_network

  db:
    image: mysql:8.0
    container_name: kh_db
    environment:
      MYSQL_DATABASE: kh_downloader
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - kh_network

networks:
  kh_network:
    driver: bridge

volumes:
  db_data:
  vendor:
  public_build:
